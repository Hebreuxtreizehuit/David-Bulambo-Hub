<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Bulambo Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
    background: #020617;
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

p.subtitle {
    color: #94a3b8;
}

section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 35px 20px;
}

section h2 {
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.book-card {
    background: #1e293b;
    max-width: 320px;
    padding: 20px;
    border-radius: 15px;
    margin: 15px auto 20px auto;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.book-card img {
    width: 220px;
    height: auto;
    border-radius: 10px;
    margin-bottom: 15px;
}

iframe {
    width: 100%;
    max-width: 700px;
    height: 390px;
    display: block;
    margin: 0 auto;
    border-radius: 12px;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px 15px;
    color: white;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

footer {
    text-align: center;
    padding: 25px;
    color: #94a3b8;
}

@media (max-width: 600px) {
    h1 {
        font-size: 26px;
    }

    .book-card {
        max-width: 90%;
    }

    .book-card img {
        width: 180px;
    }

    iframe {
        height: 220px;
    }
}
</style>
<section>
    <h2>Caregiving Videos</h2>

    <div class="card">
        <iframe width="100%" height="200"
        src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
        frameborder="0" allowfullscreen></iframe>

        <p>Daily caregiving experiences and lessons.</p>
    </div>

</section>

<section>
    <h2>Contact</h2>

    <div class="card">
        <p>Email: sephorandumbi2023@gmail.com</p>
        <p>LinkedIn: your profile</p>
        <p>Twitter: your handle</p>
    </div>

</section>

<footer>
    <p>© 2026 David Bulambo Hub</p>
</footer>

</body>
</html>
